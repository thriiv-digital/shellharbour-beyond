<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Directory Manager — SHBNG</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/png" href="uploads/logo-shellharbour-beyond-networking-group.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #1a3a6b; --teal: #0fb5c8; --teal-mid: #0097aa;
      --teal-light: #e6f7fa; --orange: #e8651a; --sand: #fdf8f2;
      --text: #1a2535; --muted: #5a6a7e; --border: #e2ecf0;
      --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #f4f6f9; color: var(--text); }

    /* ── HEADER ── */
    .dm-header {
      background: var(--navy); padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; position: sticky; top: 0; z-index: 50;
    }
    .dm-header-left { display: flex; align-items: center; gap: 12px; }
    .dm-header-left img { height: 36px; }
    .dm-header-left h1 { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; color: white; }
    .dm-header-left span { font-size: 12px; color: rgba(255,255,255,0.45); padding-left: 12px; border-left: 1px solid rgba(255,255,255,0.15); }
    .dm-header-right { display: flex; align-items: center; gap: 10px; }
    .btn-sm {
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
      transition: all 0.15s;
    }
    .btn-ghost { background: rgba(255,255,255,0.1); color: white; }
    .btn-ghost:hover { background: rgba(255,255,255,0.18); }
    .btn-teal { background: var(--teal); color: white; }
    .btn-teal:hover { background: var(--teal-mid); }
    .btn-orange { background: var(--orange); color: white; }
    .btn-orange:hover { background: #d05810; }

    /* ── STATS BAR ── */
    .dm-stats {
      background: white; border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex; gap: 32px; flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-size: 24px; font-weight: 700; color: var(--navy); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-divider { width: 1px; background: var(--border); }

    /* ── TOOLBAR ── */
    .dm-toolbar {
      padding: 16px 32px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .search-wrap {
      display: flex; align-items: center; gap: 8px;
      background: white; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 8px 14px; flex: 1; max-width: 320px;
    }
    .search-wrap input {
      border: none; background: none; font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text); outline: none; width: 100%;
    }
    .search-wrap svg { color: var(--muted); flex-shrink: 0; }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      padding: 5px 12px; border-radius: 50px; border: 1.5px solid var(--border);
      background: white; color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .chip.active { background: var(--navy); border-color: var(--navy); color: white; }
    .chip:hover:not(.active) { border-color: var(--teal-mid); color: var(--teal-mid); }
    .count-badge { margin-left: auto; font-size: 13px; color: var(--muted); }

    /* ── GRID ── */
    .dm-grid {
      padding: 0 32px 48px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px;
    }

    /* ── MEMBER CARD ── */
    .mc {
      background: white; border-radius: 12px; border: 1px solid var(--border);
      overflow: hidden; transition: box-shadow 0.2s;
    }
    .mc:hover { box-shadow: 0 4px 20px rgba(26,58,107,0.1); }
    .mc-top {
      padding: 16px 20px; display: flex; align-items: flex-start; gap: 14px;
      border-bottom: 1px solid var(--border);
    }
    .mc-logo {
      width: 52px; height: 52px; border-radius: 10px; flex-shrink: 0;
      border: 1px solid var(--border); object-fit: contain; padding: 4px; background: var(--sand);
    }
    .mc-initial {
      width: 52px; height: 52px; border-radius: 10px; flex-shrink: 0;
      background: var(--teal-light); border: 1px solid #c0e8f0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: var(--teal-mid);
      font-family: 'DM Serif Display', serif;
    }
    .mc-info { flex: 1; min-width: 0; }
    .mc-name { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mc-type { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--teal-mid); }
    .mc-id { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: monospace; }
    .mc-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border);
      background: white; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); text-decoration: none; transition: all 0.15s;
    }
    .icon-btn:hover { background: var(--teal-light); border-color: var(--teal-mid); color: var(--teal-mid); }

    /* ── FIELDS ── */
    .mc-fields { padding: 14px 20px; display: flex; flex-direction: column; gap: 7px; }
    .mc-field { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; }
    .mc-field-icon { flex-shrink: 0; color: var(--muted); margin-top: 1px; }
    .mc-field-val { color: var(--text); line-height: 1.45; word-break: break-word; }
    .mc-field-val a { color: var(--teal-mid); text-decoration: none; }
    .mc-field-val a:hover { text-decoration: underline; }
    .mc-field-empty { color: #c5cdd6; font-style: italic; }

    .mc-socials { display: flex; gap: 6px; margin-top: 4px; padding: 0 20px 14px; }
    .social-pill {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 50px;
      text-decoration: none; border: 1px solid; transition: all 0.15s;
    }
    .social-pill.fb  { color: #1877f2; border-color: #1877f2; }
    .social-pill.ig  { color: #e1306c; border-color: #e1306c; }
    .social-pill.li  { color: #0077b5; border-color: #0077b5; }
    .social-pill:hover { opacity: 0.7; }

    /* ── STATUS DOTS ── */
    .mc-footer {
      padding: 10px 20px; background: #fafbfc; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .dot-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--muted);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.yes { background: var(--green); }
    .dot.no  { background: #d1d5db; }
    .mc-footer-right { margin-left: auto; }

    /* ── EMPTY / ERROR ── */
    .dm-empty {
      grid-column: 1/-1; text-align: center; padding: 80px 24px; color: var(--muted);
    }
    .dm-empty h3 { font-family: 'DM Sans', sans-serif; color: var(--navy); margin-bottom: 8px; }

    /* ── SKELETON ── */
    .sk { background: #e9edf2; border-radius: 6px; animation: sk-pulse 1.4s ease-in-out infinite; }
    @keyframes sk-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .sk-card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
    .sk-line { height: 12px; margin-bottom: 10px; }

    @media (max-width: 600px) {
      .dm-header { padding: 0 16px; }
      .dm-stats { padding: 12px 16px; gap: 20px; }
      .dm-toolbar { padding: 12px 16px; }
      .dm-grid { padding: 0 16px 48px; grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="dm-header">
  <div class="dm-header-left">
    <img src="uploads/logo-shellharbour-beyond-networking-group.png" alt="SHBNG"/>
    <h1>Directory Manager</h1>
    <span>Shellharbour &amp; Beyond</span>
  </div>
  <div class="dm-header-right">
    <a href="members.html" target="_blank" class="btn-sm btn-ghost">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      View Public Directory
    </a>
    <a href="https://github.com/mattwilsonau/shellharbour-beyond/edit/main/directory.json" target="_blank" class="btn-sm btn-teal">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit directory.json
    </a>
  </div>
</header>

<!-- STATS -->
<div class="dm-stats" id="dm-stats">
  <div class="stat"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Total Members</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-val" id="stat-cats">—</div><div class="stat-label">Categories</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-val" id="stat-logos">—</div><div class="stat-label">Have Logos</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-val" id="stat-photos">—</div><div class="stat-label">Have Photos</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-val" id="stat-email">—</div><div class="stat-label">Have Email</div></div>
  <div class="stat-divider"></div>
  <div class="stat"><div class="stat-val" id="stat-website">—</div><div class="stat-label">Have Website</div></div>
</div>

<!-- TOOLBAR -->
<div class="dm-toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="dm-search" placeholder="Search members…"/>
  </div>
  <div class="filter-row" id="dm-filters">
    <button class="chip active" data-type="all">All</button>
  </div>
  <span class="count-badge" id="dm-count"></span>
</div>

<!-- GRID -->
<div class="dm-grid" id="dm-grid">
  <!-- skeletons -->
  <div class="sk-card"><div class="sk sk-line" style="width:40%;margin-bottom:16px"></div><div class="sk sk-line" style="width:80%"></div><div class="sk sk-line" style="width:60%"></div><div class="sk sk-line" style="width:90%"></div></div>
  <div class="sk-card"><div class="sk sk-line" style="width:40%;margin-bottom:16px"></div><div class="sk sk-line" style="width:70%"></div><div class="sk sk-line" style="width:85%"></div><div class="sk sk-line" style="width:55%"></div></div>
  <div class="sk-card"><div class="sk sk-line" style="width:40%;margin-bottom:16px"></div><div class="sk sk-line" style="width:75%"></div><div class="sk sk-line" style="width:50%"></div><div class="sk sk-line" style="width:80%"></div></div>
</div>

<script>
const TYPE_COLORS = {
  'Arts & Creative':'#fce8f3','Business Consulting':'#e8f4f0','Finance':'#e3f2fd',
  'Government & Community':'#e8edf5','Health & Wellness':'#e8f5e9','Hospitality':'#e6f7fa',
  'Marketing':'#f3e5f5','NFP / Community':'#ede7f6','Professional Services':'#fef3e8',
  'Real Estate':'#fff8e1','Retail':'#fbe9e7','Technology':'#e8eaf6','Trades':'#fce4ec','Other':'#f5f5f5'
};

let all = [], activeType = 'all', search = '';

function field(icon, val, empty = '—', link = null) {
  const isEmpty = !val;
  const display = isEmpty
    ? `<span class="mc-field-empty">${empty}</span>`
    : (link ? `<a href="${link}" target="_blank" rel="noopener noreferrer">${val}</a>` : val);
  return `<div class="mc-field"><svg class="mc-field-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icon}</svg><div class="mc-field-val">${display}</div></div>`;
}

const ICONS = {
  pin:   '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
  phone: '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.64 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l.98-.98a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>',
  mail:  '<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>',
  web:   '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
  img:   '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>',
};

function dot(label, has) {
  return `<span class="dot-badge"><span class="dot ${has ? 'yes' : 'no'}"></span>${label}</span>`;
}

function renderCards(members) {
  const grid = document.getElementById('dm-grid');
  document.getElementById('dm-count').textContent = members.length + ' member' + (members.length !== 1 ? 's' : '');
  if (!members.length) {
    grid.innerHTML = '<div class="dm-empty"><h3>No members found</h3><p>Try a different search or filter.</p></div>';
    return;
  }
  grid.innerHTML = members.map(m => {
    const logoHtml = m.logo
      ? `<img class="mc-logo" src="${m.logo}" alt="${m.name}"/>`
      : `<div class="mc-initial">${m.name[0].toUpperCase()}</div>`;
    const socials = [
      m.facebook ? `<a href="${m.facebook}" target="_blank" rel="noopener noreferrer" class="social-pill fb">Facebook</a>` : '',
      m.instagram ? `<a href="${m.instagram}" target="_blank" rel="noopener noreferrer" class="social-pill ig">Instagram</a>` : '',
      m.linkedin  ? `<a href="${m.linkedin}"  target="_blank" rel="noopener noreferrer" class="social-pill li">LinkedIn</a>`  : '',
    ].filter(Boolean).join('');
    const websiteDisplay = m.website ? m.website.replace(/^https?:\/\//, '') : '';
    return `
      <div class="mc" data-id="${m.id}">
        <div class="mc-top">
          ${logoHtml}
          <div class="mc-info">
            <div class="mc-name">${m.name}</div>
            <div class="mc-type">${m.type}</div>
            <div class="mc-id">id: ${m.id}</div>
          </div>
          <div class="mc-actions">
            <a href="member.html?id=${m.id}" target="_blank" class="icon-btn" title="View public profile">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
            <a href="https://github.com/mattwilsonau/shellharbour-beyond/edit/main/directory.json" target="_blank" class="icon-btn" title="Edit in GitHub">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </a>
          </div>
        </div>
        <div class="mc-fields">
          ${field(ICONS.pin,   m.address, 'No address')}
          ${field(ICONS.phone, m.phone,   'No phone')}
          ${field(ICONS.mail,  m.email,   'No email', m.email ? 'mailto:' + m.email : null)}
          ${field(ICONS.web,   websiteDisplay, 'No website', m.website || null)}
          ${field(ICONS.img,   m.images?.length ? m.images.length + ' photo' + (m.images.length !== 1 ? 's' : '') : '', 'No photos')}
        </div>
        ${socials ? `<div class="mc-socials">${socials}</div>` : '<div style="height:8px"></div>'}
        <div class="mc-footer">
          ${dot('Logo', !!m.logo)}
          ${dot('Photos', m.images?.length > 0)}
          ${dot('Email', !!m.email)}
          ${dot('Phone', !!m.phone)}
          ${dot('Website', !!m.website)}
          <div class="mc-footer-right">
            <span style="font-size:11px;color:var(--muted)">${m.description.length} chars</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function applyFilters() {
  let filtered = [...all];
  if (activeType !== 'all') filtered = filtered.filter(m => m.type === activeType);
  if (search) {
    const s = search.toLowerCase();
    filtered = filtered.filter(m =>
      m.name.toLowerCase().includes(s) ||
      m.type.toLowerCase().includes(s) ||
      (m.email || '').toLowerCase().includes(s) ||
      (m.address || '').toLowerCase().includes(s)
    );
  }
  renderCards(filtered);
}

fetch('directory.json?v=' + Date.now())
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(data => {
    all = data.slice().sort((a, b) => a.name.localeCompare(b.name));

    // Stats
    document.getElementById('stat-total').textContent   = all.length;
    document.getElementById('stat-cats').textContent    = new Set(all.map(m => m.type)).size;
    document.getElementById('stat-logos').textContent   = all.filter(m => m.logo).length;
    document.getElementById('stat-photos').textContent  = all.filter(m => m.images?.length).length;
    document.getElementById('stat-email').textContent   = all.filter(m => m.email).length;
    document.getElementById('stat-website').textContent = all.filter(m => m.website).length;

    // Filters
    const types = [...new Set(all.map(m => m.type))].sort();
    const filterRow = document.getElementById('dm-filters');
    types.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'chip'; btn.dataset.type = t; btn.textContent = t;
      btn.addEventListener('click', () => {
        activeType = t;
        filterRow.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
      });
      filterRow.appendChild(btn);
    });
    filterRow.querySelector('[data-type="all"]').addEventListener('click', () => {
      activeType = 'all';
      filterRow.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      filterRow.querySelector('[data-type="all"]').classList.add('active');
      applyFilters();
    });

    renderCards(all);
  })
  .catch(() => {
    document.getElementById('dm-grid').innerHTML = '<div class="dm-empty"><h3>Could not load directory.json</h3><p>Check the file exists and the server is running.</p></div>';
  });

document.getElementById('dm-search').addEventListener('input', e => {
  search = e.target.value.trim();
  applyFilters();
});
</script>
</body>
</html>
